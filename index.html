<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>My Projects Dashboard</h1>
            <p>Welcome to the main hub. Select an application to begin.</p>
        </header>

        <main class="grid">
            <a href="To_do_list/index.html" class="card">
                <div class="card-icon">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <h2>TaskMaster Pro</h2>
                <p>Organize your work effortlessly with this interactive To-Do list.</p>
                <div class="card-footer">
                    <span>Launch App <i class="fa-solid fa-arrow-right"></i></span>
                </div>
            </a>

            <a href="weather API/index.html" class="card">
                <div class="card-icon">
                    <i class="fa-solid fa-cloud-sun-rain"></i>
                </div>
                <h2>ClimaView</h2>
                <p>Check the latest weather forecasts from a beautifully designed dashboard.</p>
                <div class="card-footer">
                    <span>Launch App <i class="fa-solid fa-arrow-right"></i></span>
                </div>
            </a>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
